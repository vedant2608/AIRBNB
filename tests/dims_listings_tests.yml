models:
  - name: dims_listing_cleansed
    columns:
      - name: listing_id
        data_tests:
          - not_null
          - unique

      - name: host_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dims_host_cleansed') 
                field: host_id
      - name: room_type
        tests:
          - accepted_values: 
              arguments:
               values: ['Shared room','Hotel room','Entire home/apt','Private room']